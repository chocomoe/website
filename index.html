<!DOCTYPE html>
<html lang="fr">
<head>

<body>

    <div class="hero-content">

        <h1>ChocoMoe</h1>

        </button>

</section>

</div>

</div>

</div>

</div>

</div>

</section>

<script src="script.js"></script>
